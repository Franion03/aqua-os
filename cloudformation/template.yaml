AWSTemplateFormatVersion: "2010-09-09"
Description: >
  AquaOS PoC — Agentic Water Polo Club Manager.
  Deploys EC2 t3.micro (free-tier) + S3 + CloudFront.
  Backend: FastAPI + CrewAI with Google Gemini.
  Region: eu-west-1 (Ireland).

# ═══════════════════════════════════════════════════════════════════════════
# Parameters
# ═══════════════════════════════════════════════════════════════════════════

Parameters:

  SshKeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Existing EC2 key pair for SSH access.

  GeminiApiKey:
    Type: String
    NoEcho: true
    Description: Google Gemini API key (https://aistudio.google.com/).

  AllowedSshCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR allowed to SSH in. Restrict to your IP in production (e.g. 83.45.123.67/32).
    AllowedPattern: ^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$
    ConstraintDescription: Must be a valid IPv4 CIDR block.

  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues: [t3.micro, t3.small]
    Description: EC2 instance type (t3.micro is free-tier eligible).

  RootVolumeSize:
    Type: Number
    Default: 20
    MinValue: 10
    MaxValue: 30
    Description: "Root EBS volume size in GB (free tier: up to 30 GB)."

  ProjectName:
    Type: String
    Default: aquaos
    Description: Project name prefix for resource naming.

  Environment:
    Type: String
    Default: poc
    AllowedValues: [poc, dev, stg]
    Description: Environment tag.

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Latest Amazon Linux 2023 AMI (auto-resolved from SSM Parameter Store).

# ═══════════════════════════════════════════════════════════════════════════
# Resources
# ═══════════════════════════════════════════════════════════════════════════

Resources:

  # ── VPC ─────────────────────────────────────────────────────────────────

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-igw

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-public-subnet

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-public-rt

  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # ── Security Group ──────────────────────────────────────────────────────

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub ${ProjectName}-sg
      GroupDescription: AquaOS PoC security group
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - Description: SSH from operator
          IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedSshCidr
        - Description: HTTP public
          IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - Description: HTTPS public
          IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-sg

  # ── EC2 Instance ────────────────────────────────────────────────────────

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref SecurityGroup
      KeyName: !Ref SshKeyName
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeType: gp3
            VolumeSize: !Ref RootVolumeSize
            Encrypted: true
      UserData:
        Fn::Base64: !Sub |
          #!/usr/bin/env bash
          set -euo pipefail
          exec > >(tee -a /var/log/aquaos-bootstrap.log) 2>&1
          echo "=== AquaOS Bootstrap started at $(date -u) ==="

          # System updates
          dnf update -y

          # Runtime dependencies
          dnf install -y python3.12 python3.12-pip python3.12-devel nginx git gcc sqlite-devel
          alternatives --set python3 /usr/bin/python3.12 || true
          python3.12 -m ensurepip --upgrade || true
          pip3.12 install --upgrade pip

          # Clone repo
          APP_DIR="/opt/aquaos"
          mkdir -p "$${APP_DIR}"
          if [ ! -d "$${APP_DIR}/.git" ]; then
            git clone https://github.com/franion03/aqua-os.git "$${APP_DIR}"
          fi
          cd "$${APP_DIR}"

          # Python dependencies
          pip3.12 install fastapi uvicorn[standard] crewai crewai-tools chromadb sqlalchemy python-dotenv pydantic httpx

          # Gemini API key
          mkdir -p backend
          cat > backend/.env << ENVEOF
          GEMINI_API_KEY=${GeminiApiKey}
          ENVEOF

          # Nginx config
          cat > /etc/nginx/conf.d/aquaos.conf << 'NGINXEOF'
          server {
              listen 80;
              server_name _;
              root /opt/aquaos/dist;
              index index.html;
              location /api/ {
                  proxy_pass http://127.0.0.1:8000;
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_read_timeout 120s;
              }
              location / {
                  try_files $uri $uri/ /index.html;
              }
              gzip on;
              gzip_types text/plain text/css application/json application/javascript text/xml;
          }
          NGINXEOF
          rm -f /etc/nginx/conf.d/default.conf

          # systemd service
          cat > /etc/systemd/system/aquaos-backend.service << SERVICEEOF
          [Unit]
          Description=AquaOS FastAPI Backend (CrewAI)
          After=network.target
          [Service]
          Type=simple
          User=ec2-user
          WorkingDirectory=/opt/aquaos/backend
          Environment=PYTHONUNBUFFERED=1
          Environment=GEMINI_API_KEY=${GeminiApiKey}
          ExecStart=/usr/bin/python3.12 -m uvicorn main:app --host 127.0.0.1 --port 8000 --workers 2
          Restart=always
          RestartSec=5
          [Install]
          WantedBy=multi-user.target
          SERVICEEOF
          systemctl daemon-reload
          systemctl enable aquaos-backend

          # Placeholder frontend
          if [ ! -f "$${APP_DIR}/dist/index.html" ]; then
            mkdir -p "$${APP_DIR}/dist"
            cat > "$${APP_DIR}/dist/index.html" << HTMLEOF
          <!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>AquaOS — PoC</title><style>body{font-family:system-ui;max-width:720px;margin:4rem auto;padding:0 1rem;background:#0f172a;color:#e2e8f0}h1{color:#22d3ee}code{background:#1e293b;padding:.15em .4em;border-radius:4px}.endpoint{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:1rem;margin:.5rem 0}.method{font-weight:700;color:#22d3ee}</style></head><body><h1>🤽 AquaOS PoC — Running</h1><p>Backend alive. API endpoints:</p><div class="endpoint"><span class="method">GET</span> <code>/api/health</code> — Health check</div><div class="endpoint"><span class="method">GET</span> <code>/api/players</code> — List players</div><div class="endpoint"><span class="method">POST</span> <code>/api/crew/run</code> — Trigger agent crew</div><div class="endpoint"><span class="method">GET</span> <code>/api/crew/status</code> — Last crew status</div><p style="margin-top:2rem;font-size:.85rem;color:#64748b">Full React dashboard deploys separately via <code>npm run build</code> → S3 + CloudFront.</p></body></html>
          HTMLEOF
          fi
          chown -R ec2-user:ec2-user "$${APP_DIR}"

          systemctl enable nginx
          systemctl start nginx
          systemctl start aquaos-backend || true

          echo "=== AquaOS Bootstrap completed at $(date -u) ==="

      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-instance

  # ── Elastic IP ──────────────────────────────────────────────────────────

  ElasticIP:
    Type: AWS::EC2::EIP
    Properties:
      InstanceId: !Ref EC2Instance
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-eip

  # ── S3 Bucket (frontend) ────────────────────────────────────────────────

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${ProjectName}-frontend-${Environment}-${AWS::AccountId}
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-frontend

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOAI
            Effect: Allow
            Principal:
              AWS: !Sub arn:aws:iam::cloudfront:user/CloudFront Origin Access Identity ${CloudFrontOAI}
            Action: s3:GetObject
            Resource: !Sub ${FrontendBucket.Arn}/*

  # ── CloudFront ──────────────────────────────────────────────────────────

  CloudFrontOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: OAI for AquaOS frontend bucket

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        IPV6Enabled: true
        Comment: AquaOS frontend CDN
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        Origins:
          - Id: S3-aquaos-frontend
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub origin-access-identity/cloudfront/${CloudFrontOAI}
          - Id: EC2-aquaos-backend
            DomainName: !GetAtt ElasticIP.DNSName
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: http-only
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: S3-aquaos-frontend
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
          ForwardedValues:
            QueryString: false
            Headers: [Origin, Access-Control-Request-Method, Access-Control-Request-Headers]
            Cookies:
              Forward: none
          MinTTL: 0
          DefaultTTL: 3600
          MaxTTL: 86400
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: EC2-aquaos-backend
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [DELETE, GET, HEAD, OPTIONS, PATCH, POST, PUT]
            CachedMethods: [GET, HEAD]
            ForwardedValues:
              QueryString: true
              Headers: ["*"]
              Cookies:
                Forward: all
            MinTTL: 0
            DefaultTTL: 0
            MaxTTL: 0
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
        Restrictions:
          GeoRestriction:
            RestrictionType: none
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-cdn

# ═══════════════════════════════════════════════════════════════════════════
# Outputs
# ═══════════════════════════════════════════════════════════════════════════

Outputs:

  InstancePublicIp:
    Description: Public IP of the EC2 instance
    Value: !Ref ElasticIP

  InstancePublicDns:
    Description: Public DNS of the EC2 instance
    Value: !GetAtt ElasticIP.DNSName

  SshCommand:
    Description: SSH command to connect
    Value: !Sub ssh -i ${SshKeyName}.pem ec2-user@${ElasticIP}

  CloudFrontDomain:
    Description: CloudFront distribution domain name
    Value: !GetAtt CloudFrontDistribution.DomainName

  FrontendUrl:
    Description: AquaOS frontend URL
    Value: !Sub https://${CloudFrontDistribution.DomainName}

  ApiUrl:
    Description: AquaOS API URL
    Value: !Sub https://${CloudFrontDistribution.DomainName}/api

  HealthCheckUrl:
    Description: Direct health check (bypass CloudFront)
    Value: !Sub http://${ElasticIP}/api/health

  S3BucketName:
    Description: S3 bucket for frontend assets
    Value: !Ref FrontendBucket

  FrontendDeployCommand:
    Description: Command to deploy React build to S3
    Value: !Sub aws s3 sync dist/ s3://${FrontendBucket}/ --delete
