# Full-stack local development compose for aqua-os microservices
# Clone all repos as siblings, then run from this directory:
#   docker compose -f docker-compose.microservices.yml up --build

services:
  backend:
    build:
      context: ../aqua-os-backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - JWT_KEY=dev-secret-change-me
      - DB_PATH=/data/aquaos.db
    volumes:
      - backend-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  crew:
    build:
      context: ../aqua-os-crew
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      backend:
        condition: service_healthy

  web:
    build:
      context: ../aqua-os-web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

  calendar:
    build:
      context: ../aqua-os-calendar/PublishGameCalendar
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=aquaos_calendar;Username=aquaos;Password=devpassword
      - RabbitMQ__Host=rabbitmq
    depends_on:
      - postgres
      - rabbitmq

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=aquaos_calendar
      - POSTGRES_USER=aquaos
      - POSTGRES_PASSWORD=devpassword
    volumes:
      - postgres-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=aquaos
      - RABBITMQ_DEFAULT_PASS=devpassword

volumes:
  backend-data:
  postgres-data:
